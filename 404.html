<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الصفحة غير موجودة — Souq Al Moqawil</title>
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Tajawal:wght@400;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Tajawal',sans-serif;background:linear-gradient(160deg,#7c2d12,#3b0a00);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;color:#fff;text-align:center}
.icon{font-size:6rem;animation:shake 2s ease-in-out infinite;margin-bottom:24px}
@keyframes shake{0%,100%{transform:rotate(-5deg)}50%{transform:rotate(5deg)}}
.code{font-family:'Amiri',serif;font-size:5rem;color:#fbbf24;font-weight:700;line-height:1;margin-bottom:12px}
.title{font-size:1.5rem;font-weight:800;margin-bottom:8px}
.sub{font-size:.95rem;color:rgba(255,255,255,.65);margin-bottom:36px;line-height:1.7}
.btn{display:inline-block;background:linear-gradient(135deg,#d97706,#fbbf24);color:#1a1a2e;padding:14px 32px;border-radius:12px;font-family:'Tajawal',sans-serif;font-size:1rem;font-weight:800;text-decoration:none;transition:transform .2s}
.btn:active{transform:scale(.97)}
.app-name{font-family:'Amiri',serif;font-size:1.1rem;color:rgba(255,255,255,.4);margin-top:40px}
</style>
</head>
<body>
  <div class="icon">🏗️</div>
  <div class="code">404</div>
  <div class="title">الصفحة غير موجودة</div>
  <div class="sub">
    هذه الصفحة غير موجودة أو تم نقلها<br>
    <span style="font-size:.82rem">Cette page n'existe pas ou a été déplacée</span>
  </div>
  <a href="/" class="btn">🏠 الرجوع للرئيسية</a>
  <div class="app-name">Souq Al Moqawil — سوق المقاول</div>
</body>
</html>
